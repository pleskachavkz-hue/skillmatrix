<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{title}}</title>

    <style>
        :root {
            --bg: #f6f8fa;
            --panel: #ffffff;
            --border: #d0d7de;
            --text: #111;
            --muted: #6e7781;
        }

        html, body {
            margin: 0;
            padding: 0;

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Helvetica,
                Arial,
                sans-serif;

            font-size: 14px;
            background: var(--bg);
            color: var(--text);
        }

        /* LAYOUT */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR (dashboard style) */
        .sidebar {
            width: 260px;

            background: var(--panel);
            border-right: 1px solid var(--border);

            padding: 6px;

            position: sticky;
            top: 0;
            height: 100vh;

            overflow-y: auto;
        }

        .brand {
            font-weight: 700;
            font-size: 15px;

            padding: 8px 10px;
            margin-bottom: 6px;
        }

        .sidebar details {
            margin: 4px 0;
        }

        .sidebar summary {
            cursor: pointer;

            padding: 6px 8px;

            font-size: 13px;
            font-weight: 600;

            border-radius: 6px;

            list-style: none;
        }

        .sidebar summary::-webkit-details-marker {
            display: none;
        }

        .sidebar summary:hover {
            background: #f3f4f6;
        }

        .sidebar a {
            display: block;

            padding: 5px 8px;
            margin-left: 6px;

            font-size: 13px;

            text-decoration: none;
            color: var(--text);

            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #f3f4f6;
        }

        /* MAIN */
        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        /* TOP BAR (very minimal dashboard header) */
        .topbar {
            background: var(--panel);
            border-bottom: 1px solid var(--border);

            padding: 8px 12px;

            font-size: 13px;
            color: var(--muted);
        }

        /* CONTENT — НЕ КАРТОЧКА, А ПАНЕЛЬ */
        .content {
            max-width: 1000px;
            width: 100%;

            margin: 0 auto;

            padding: 12px;
        }

        .page {
            background: var(--panel);
            border: 1px solid var(--border);

            padding: 14px 16px;

            min-height: calc(100vh - 80px);
        }

        /* typography */
        .page h1 {
            font-size: 18px;
            margin: 0 0 10px 0;
        }

        .page h2 {
            font-size: 15px;
            margin-top: 16px;
        }

        .page p,
        .page li {
            font-size: 14px;
            line-height: 1.6;
        }

        .page pre {
            background: #f6f8fa;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
        }

        /* REMOVE DUPLICATE TITLE */
        .page h1:first-child {
            display: none;
        }

        /* MOBILE */
        @media (max-width: 900px) {
            .layout {
                display: block;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .content {
                padding: 8px;
            }
        }
    </style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="brand">
            SkillMatrix
        </div>

        {{sidebar}}

    </aside>

    <main class="main">

        <div class="topbar">
            {{title}}
        </div>

        <div class="content">
            <div class="page">
                {{content}}
            </div>
        </div>

    </main>

</div>

</body>
</html>
