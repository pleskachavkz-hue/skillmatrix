<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{title}}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f6f8fa;
        }

        /* Sidebar tweaks */
        .sidebar {
            height: 100vh;
            position: sticky;
            top: 0;
        }

        .sidebar a {
            text-decoration: none;
        }

        .sidebar .folder {
            font-weight: 600;
            font-size: 13px;
        }

        .sidebar .file {
            font-size: 13px;
            display: block;

            padding: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar details {
            margin-bottom: 6px;
        }

        .sidebar summary {
            cursor: pointer;
            list-style: none;
        }

        .sidebar summary::-webkit-details-marker {
            display: none;
        }

        /* Content */
        .content-box {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;

            padding: 18px;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #dee2e6;

            padding: 10px 16px;
            font-size: 13px;
            color: #6c757d;
        }

        .content {
            max-width: 1000px;
        }

        /* Markdown polish */
        .content-box h1 {
            font-size: 20px;
        }

        .content-box h2 {
            font-size: 16px;
            margin-top: 18px;
        }

        .content-box h3 {
            font-size: 14px;
        }

        .content-box p,
        .content-box li {
            font-size: 14px;
            line-height: 1.6;
        }

        .content-box pre {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
        }

        /* remove duplicate title if markdown has h1 */
        .content-box h1:first-child {
            display: none;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <nav class="col-12 col-md-3 col-lg-2 bg-white border-end sidebar p-2">

            <div class="fw-bold px-2 py-2 border-bottom mb-2">
                SkillMatrix
            </div>

            {{sidebar}}

        </nav>

        <!-- MAIN -->
        <main class="col-12 col-md-9 col-lg-10 p-0">

            <div class="topbar">
                {{title}}
            </div>

            <div class="p-3">

                <div class="content">
                    <div class="content-box">
                        {{content}}
                    </div>
                </div>

            </div>

        </main>

    </div>
</div>

</body>
</html>
