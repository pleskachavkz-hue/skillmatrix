<!doctype html>
<html lang="ru">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{title}}</title>

<style>

:root {
    --bg: #f8f9fa;
    --panel: #ffffff;
    --border: #dee2e6;
    --text: #212529;
    --muted: #6c757d;
}

html, body {
    margin: 0;
    padding: 0;

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 14px;

    background: var(--bg);
    color: var(--text);
}

/* LAYOUT */
.layout {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 260px;

    background: var(--panel);
    border-right: 1px solid var(--border);

    padding: 8px;

    position: sticky;
    top: 0;
    height: 100vh;

    overflow-y: auto;
}

.brand {
    font-weight: 700;
    font-size: 15px;

    padding: 8px 10px;
    margin-bottom: 6px;
}

.sidebar details {
    margin: 6px 0;
}

.sidebar summary {
    cursor: pointer;

    padding: 6px 8px;

    font-size: 13px;
    font-weight: 600;

    border-radius: 6px;

    list-style: none;
}

.sidebar summary::-webkit-details-marker {
    display: none;
}

.sidebar summary:hover {
    background: #f1f3f5;
}

.sidebar a {
    display: block;

    padding: 5px 10px;
    margin-left: 6px;

    font-size: 13px;

    text-decoration: none;
    color: var(--text);

    border-radius: 6px;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sidebar a:hover {
    background: #f1f3f5;
}

/* MAIN */
.main {
    flex: 1;
    min-width: 0;

    display: flex;
    flex-direction: column;
}

.topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);

    padding: 10px 14px;

    font-size: 13px;
    color: var(--muted);
}

/* CONTENT */
.content {
    max-width: 980px;

    margin: 0 auto;

    padding: 16px;
}

.page {
    background: var(--panel);
    border: 1px solid var(--border);

    border-radius: 8px;

    padding: 18px 20px;
}

.page h1 {
    font-size: 18px;
    margin-top: 0;
}

.page h2 {
    font-size: 16px;
    margin-top: 18px;
}

.page p, .page li {
    font-size: 14px;
    line-height: 1.6;
}

.page pre {
    background: #f1f3f5;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
}

/* REMOVE DUPLICATE H1 */
.page h1:first-child {
    display: none;
}

/* MOBILE */
@media (max-width: 900px) {
    .layout {
        display: block;
    }

    .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
    }

    .content {
        padding: 10px;
    }
}

</style>

</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="brand">SkillMatrix</div>
        {{sidebar}}
    </aside>

    <main class="main">

        <div class="topbar">
            {{title}}
        </div>

        <div class="content">
            <div class="page">
                {{content}}
            </div>
        </div>

    </main>

</div>

</body>
</html>
