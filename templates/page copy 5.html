<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{title}}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f6f8fa;
        }

        /* Top navbar */
        .topbar {
            background: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        /* Content container */
        .content-box {
            background: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;

            padding: 18px;
        }

        .content-wrapper {
            max-width: 1000px;
        }

        /* Typography tweaks */
        .content-box h1 {
            font-size: 20px;
        }

        .content-box h2 {
            font-size: 16px;
            margin-top: 18px;
        }

        .content-box h3 {
            font-size: 14px;
        }

        .content-box p,
        .content-box li {
            font-size: 14px;
            line-height: 1.6;
        }

        .content-box pre {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
        }

        .content-box h1:first-child {
            display: none;
        }

        /* “Home grid” for index page */
        .index-grid a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg topbar">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="{{root}}index.html">
            SkillMatrix
        </a>

        <div class="navbar-text small text-muted">
            {{title}}
        </div>

    </div>
</nav>

<!-- MAIN -->
<div class="container py-3">

    <div class="content-wrapper mx-auto">

        <div class="content-box">

            {{content}}

        </div>

    </div>

</div>

</body>
</html>
