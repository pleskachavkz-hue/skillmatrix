<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ title }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f6f8fa;
            color: #212529;
        }

        /* TOPBAR */
        .topbar {
            background: #ffffff;
            border-bottom: 1px solid #dee2e6;
            padding: 10px 14px;
        }

        .brand {
            font-weight: 700;
            text-decoration: none;
            color: #212529;
        }

        /* LAYOUT */
        .wrapper {
            max-width: 1000px;
        }

        /* BREADCRUMBS */
        .breadcrumbs {
            font-size: 13px;
            color: #6c757d;
            margin: 12px 0;
        }

        .breadcrumbs a {
            color: #6c757d;
            text-decoration: none;
        }

        .breadcrumbs a:hover {
            text-decoration: underline;
        }

        /* CONTENT BOX */
        .content-box {
            background: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 18px;
        }

        /* INDEX NAV (home page) */
        .index-section {
            margin-bottom: 18px;
        }

        .index-section h3 {
            font-size: 14px;
            margin-bottom: 6px;
            color: #6c757d;
        }

        .index-link {
            display: block;
            padding: 2px 0;
            font-size: 14px;
            text-decoration: none;
            color: #212529;
        }

        .index-link:hover {
            text-decoration: underline;
        }

        /* MARKDOWN */
        .content-box h1 {
            font-size: 20px;
            margin-top: 0;
        }

        .content-box h2 {
            font-size: 16px;
            margin-top: 18px;
        }

        .content-box h3 {
            font-size: 14px;
        }

        .content-box p,
        .content-box li {
            font-size: 14px;
            line-height: 1.6;
        }

        .content-box pre {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
        }

        /* hide duplicate markdown title */
        .content-box h1:first-child {
            display: none;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<nav class="topbar">
    <div class="container-fluid d-flex justify-content-between align-items-center">

        <a href="{{ root }}index.html" class="brand">
            SkillMatrix
        </a>

        <div class="text-muted small">
            {{ title }}
        </div>

    </div>
</nav>

<!-- MAIN -->
<div class="container py-3 wrapper">

    <!-- BREADCRUMBS -->
    <div class="breadcrumbs">
        {% if breadcrumbs %}
            {% for name, link in breadcrumbs %}
                {% if not loop.last %}
                    <a href="{{ root }}{{ link }}">{{ name }}</a> /
                {% else %}
                    {{ name }}
                {% endif %}
            {% endfor %}
        {% endif %}
    </div>

    <!-- CONTENT -->
    <div class="content-box">

        {{ content }}

    </div>

</div>

</body>
</html>
