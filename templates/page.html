<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{title}}</title>

<script src="https://cdn.tailwindcss.com?plugins=typography"></script>

<style>

body {
    background: #f8fafc;
}

.prose {
    max-width: none;
}

pre {
    overflow-x: auto;
    border-radius: 12px;
}

aside {
    scrollbar-width: thin;
}

details summary {
    list-style: none;
}

details summary::-webkit-details-marker {
    display: none;
}

</style>

</head>

<body>

<div class="max-w-7xl mx-auto">

<div class="grid grid-cols-12">

<!-- Sidebar -->

<aside
class="
col-span-3
border-r
border-slate-200
bg-white
min-h-screen
p-6
sticky
top-0
overflow-y-auto
"
>

<a
href="{{root}}index.html"
class="
text-2xl
font-bold
block
mb-8
"
>
SkillMatrix
</a>

{{sidebar}}

</aside>

<!-- Content -->

<main
class="
col-span-9
p-10
"
>

<div
class="
text-sm
text-slate-500
mb-8
"
>
{{breadcrumbs}}
</div>

<article
class="
prose
prose-slate
prose-lg
max-w-none
"
>
{{content}}
</article>

</main>

</div>

</div>

</body>
</html>
