<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{title}}</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <style>
        :root {
            --bg: #f7f7f8;
            --panel: #ffffff;
            --border: #e6e6e6;
            --text: #111;
            --muted: #666;
        }

        html, body {
            margin: 0;
            padding: 0;

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Helvetica,
                Arial,
                sans-serif;

            font-size: 14px;
            background: var(--bg);
            color: var(--text);
        }

        /* LAYOUT */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            flex-shrink: 0;

            background: var(--panel);
            border-right: 1px solid var(--border);

            padding: 6px;

            position: sticky;
            top: 0;
            height: 100vh;

            overflow-y: auto;
        }

        .brand {
            font-weight: 700;
            font-size: 15px;

            padding: 6px 8px;
            margin-bottom: 6px;

            border-bottom: 1px solid var(--border);
        }

        /* ACCORDION FIX */
        .sidebar details {
            margin: 8px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .sidebar summary {
            list-style: none;
            cursor: pointer;

            padding: 4px 8px;
            margin: 0;

            font-size: 13px;
            font-weight: 600;

            border-radius: 6px;
        }

        .sidebar summary:hover {
            background: #f2f2f2;
        }

        .sidebar summary::-webkit-details-marker {
            display: none;
        }

        .sidebar details > div {
            margin: 0;
            padding: 0;
        }

        .sidebar a {
            display: block;

            padding: 3px 8px;
            margin-left: 6px;

            font-size: 13px;

            text-decoration: none;
            color: var(--text);

            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #f2f2f2;
        }

        /* MAIN */
        .main {
            flex: 1;
            min-width: 0;

            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--panel);
            border-bottom: 1px solid var(--border);

            padding: 8px 14px;

            font-size: 13px;
            color: var(--muted);
        }

        .breadcrumbs {
            padding: 4px 14px;

            font-size: 12px;
            color: var(--muted);
        }

        /* CONTENT (tight chat style) */
        .content {
            max-width: 860px;
            width: 100%;

            margin: 0 auto;

            padding: 8px 12px;
        }

        .message {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;

            padding: 12px 14px;
            margin-bottom: 10px;

            line-height: 1.6;
        }

        /* REMOVE DUPLICATE H1 */
        .content h1:first-child {
            display: none;
        }

        .content h2 {
            font-size: 16px;
            margin-top: 16px;
        }

        .content h3 {
            font-size: 14px;
            margin-top: 14px;
        }

        .content p,
        .content li {
            font-size: 14px;
            line-height: 1.6;
        }

        .content pre {
            background: #f6f6f6;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            overflow-x: auto;
        }

        blockquote {
            border-left: 3px solid #ddd;
            padding-left: 10px;
            margin: 0;
            color: #555;
        }

        /* MOBILE */
        @media (max-width: 900px) {
            .layout {
                display: block;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .content {
                padding: 8px;
            }

            .breadcrumbs {
                padding: 6px 10px;
            }
        }
    </style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="brand">
            SkillMatrix
        </div>

        {{sidebar}}

    </aside>

    <main class="main">

        <div class="topbar">
            {{title}}
        </div>

        <div class="breadcrumbs">
            {{breadcrumbs}}
        </div>

        <div class="content">
            <div class="message">
                {{content}}
            </div>
        </div>

    </main>

</div>

</body>
</html>
